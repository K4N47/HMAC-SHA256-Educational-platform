<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Dark rounded background -->
  <rect width="64" height="64" rx="14" fill="#0D0D0D"/>

  <!-- Subtle blue border glow -->
  <rect width="64" height="64" rx="14" fill="none"
        stroke="#3B82F6" stroke-width="1.5" opacity="0.45"/>

  <!-- Padlock shackle (gold) -->
  <path d="M20 27 v-6 a12 12 0 0 1 24 0 v6"
        fill="none" stroke="#F59E0B" stroke-width="5"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Padlock body (blue gradient-like with two rects) -->
  <rect x="12" y="27" width="40" height="28" rx="8" fill="#2563EB"/>
  <rect x="12" y="27" width="40" height="14" rx="8" fill="#3B82F6"/>

  <!-- Keyhole circle -->
  <circle cx="32" cy="39" r="5" fill="#1a3a6b"/>

  <!-- Keyhole slot -->
  <rect x="29.5" y="39" width="5" height="9" rx="2.5" fill="#1a3a6b"/>

  <!-- Small hex dots — subtle crypto detail -->
  <circle cx="20" cy="53" r="1.4" fill="rgba(255,255,255,0.18)"/>
  <circle cx="27" cy="55" r="1.4" fill="rgba(255,255,255,0.18)"/>
  <circle cx="34" cy="56" r="1.4" fill="rgba(255,255,255,0.18)"/>
  <circle cx="41" cy="55" r="1.4" fill="rgba(255,255,255,0.18)"/>
  <circle cx="47" cy="53" r="1.4" fill="rgba(255,255,255,0.18)"/>
</svg>
